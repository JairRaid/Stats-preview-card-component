<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Stats preview card component showing business metrics and insights."
    />
    <title>Stats preview card component</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lexend+Deca&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="page-shell">
      <main class="main-content">
        <article class="card" aria-labelledby="card-title">
          <picture class="card__media">
            <source
              media="(min-width: 768px)"
              srcset="assets/images/hero-md.jpg"
            />
            <img
              src="assets/images/hero-sm.jpg"
              alt="Women collaborating inside a modern office."
              width="327"
              height="240"
            />
          </picture>

          <section class="card__content">
            <header>
              <h1 id="card-title" class="card-title">
                Get <span class="highlight">insights</span> that help your
                business grow.
              </h1>
              <p>
                Discover the benefits of data analytics and make better
                decisions regarding revenue, customer experience, and overall
                efficiency.
              </p>
            </header>

            <dl class="stats" aria-label="Business statistics">
              <div class="stats-item" role="group">
                <dt>Companies</dt>
                <dd>10k+</dd>
              </div>
              <div class="stats-item" role="" group>
                <dt>Templates</dt>
                <dd>314</dd>
              </div>
              <div class="stats-item" role="" group>
                <dt>Queries</dt>
                <dd>12M+</dd>
              </div>
            </dl>
          </section>
        </article>
      </main>
    </div>
  </body>
</html>
